- Phase 2 kernel/workspace boundaries
- Phase 4 memory boundaries
- Phase 5 graph boundaries
- Phase 6 simulator boundaries
- Phase 7 conversation ownership
- Phase 8 science/world-awareness ownership

You must reject:
- one giant mixed engine designs
- hidden chain-of-thought leakage
- silent mutation of earlier-phase truth
- later-phase leakage into the current phase
